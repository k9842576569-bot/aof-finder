<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOF Finder v6 - </title>

<style>

body{
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
  margin-top:0;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.save{
  background:#28a745;
  color:white;
}

.test{
  background:#007bff;
  color:white;
}

.refresh{
  background:#007bff;
  color:white;
  width:100%;
}

.block{
  background:#dc3545;
  color:white;
}

.connected{
  background:#28a745;
  color:white;
  padding:10px;
  margin-top:10px;
}

.device{
  border:1px solid #ccc;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
}

</style>

</head>
<body>

<div class="container">

<h2>Google Sheet Connection</h2>

<input type="text" id="scriptURL" placeholder="Paste Google Script URL">

<button class="save" onclick="saveURL()">SAVE</button>

<button class="test" onclick="testConnection()">TEST</button>

<div id="status"></div>

<h2>Devices</h2>

<button class="refresh" onclick="loadDevices()">REFRESH DEVICE LIST</button>

<div id="deviceList"></div>

</div>

<script>

function saveURL(){
  const url=document.getElementById("scriptURL").value;
  localStorage.setItem("scriptURL",url);
  alert("Saved");
}

function testConnection(){

  const url=localStorage.getItem("scriptURL");

  if(!url){
    alert("No URL saved");
    return;
  }

  fetch(url+"?action=test")
  .then(r=>r.json())
  .then(d=>{

    if(d.status=="ok"){
      document.getElementById("status").innerHTML=
      "<div class='connected'>CONNECTED</div>";
    }

  });

}

function getDeviceId(){

  let id=localStorage.getItem("deviceId");

  if(!id){

    id="DEV-"+Math.random().toString(36).substr(2,9);

    localStorage.setItem("deviceId",id);

  }

  return id;

}

function autoRegisterDevice(){

  const url=localStorage.getItem("scriptURL");

  if(!url) return;

  const id=getDeviceId();

  const name=navigator.userAgent.includes("Mobile")
  ?"Mobile-"+id
  :"PC-"+id;

  fetch(url+
    "?action=register"+
    "&deviceId="+encodeURIComponent(id)+
    "&deviceName="+encodeURIComponent(name)+
    "&time="+encodeURIComponent(new Date().toLocaleString())
  )
  .then(r=>r.json())
  .then(d=>console.log(d));

}

function loadDevices(){

  const url=localStorage.getItem("scriptURL");

  if(!url) return;

  fetch(url+"?action=list")
  .then(r=>r.json())
  .then(data=>{

    const list=document.getElementById("deviceList");

    list.innerHTML="";

    data.devices.forEach(d=>{

      list.innerHTML+=
      "<div class='device'>"+
      "<b>"+d.name+"</b><br>"+
      "ID: "+d.deviceId+"<br>"+
      "Status: "+d.status+
      "<br>"+
      "<button class='block' onclick=\"blockDevice('"+d.deviceId+"')\">BLOCK</button>"+
      "</div>";

    });

  });

}

function blockDevice(id){

  const url=localStorage.getItem("scriptURL");

  fetch(url+
    "?action=update"+
    "&deviceId="+id+
    "&status=blocked"
  )
  .then(()=>loadDevices());

}

document.addEventListener("DOMContentLoaded",function(){

  const url=localStorage.getItem("scriptURL");

  if(url)
    document.getElementById("scriptURL").value=url;

  autoRegisterDevice();

  testConnection();

  loadDevices();

});

</script>

</body>
</html>
