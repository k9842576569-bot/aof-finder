<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOF Diagnostic Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#1a1a2e;color:#fff;padding:12px;}
h2{color:#2196F3;text-align:center;margin-bottom:4px;font-size:16px;}
p{text-align:center;font-size:11px;color:#aaa;margin-bottom:10px;}
.section{background:#0d1b2a;border:2px solid #1e3a5f;border-radius:12px;padding:12px;margin-bottom:10px;}
.section-title{color:#2196F3;font-size:13px;font-weight:800;margin-bottom:8px;}
button{width:100%;padding:12px;margin:4px 0;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;text-align:left;}
.b-blue{background:#2196F3;color:#fff;}
.b-green{background:#4CAF50;color:#fff;}
.b-orange{background:#FF9800;color:#fff;}
.b-purple{background:#9C27B0;color:#fff;}
.b-red{background:#f44336;color:#fff;}
.b-grey{background:#555;color:#fff;}
#log{background:#000;border:2px solid #333;border-radius:10px;padding:10px;margin-top:10px;min-height:200px;font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;}
.ok{color:#4CAF50;}.err{color:#f44336;}.info{color:#64b5f6;}.warn{color:#FF9800;}.head{color:#fff;font-weight:800;}
input{width:100%;padding:8px;border-radius:8px;border:2px solid #333;background:#0a0a1a;color:#fff;font-size:12px;margin:3px 0;}
label{font-size:11px;color:#aaa;font-weight:700;}
.row{display:flex;gap:6px;}
.row button{flex:1;}
</style>
</head>
<body>
<h2>🔍 AOF Diagnostic Tool v2</h2>
<p>Test ALL Google Sheet features — check log before building app</p>

<div class="section">
  <div class="section-title">📌 Script URL</div>
  <input id="urlInput" value="https://script.google.com/macros/s/AKfycbxsJVAIlsGuUnugTskY8EDT6wQ_bIkghTBLCd-KGc7T7NPyvvgGMZ8a8DHehNyfvrlh/exec">
</div>

<div class="section">
  <div class="section-title">1️⃣ Basic Tests</div>
  <button class="b-blue" onclick="testConnection()">🔌 Test Connection</button>
  <button class="b-green" onclick="testGetConfig()">🔑 Get Config Keys</button>
  <button class="b-orange" onclick="testListDevices()">📱 List Devices</button>
</div>

<div class="section">
  <div class="section-title">2️⃣ OCR Tests</div>
  <label>Device ID for OCR test:</label>
  <input id="testDeviceId" placeholder="e.g. AOF-00OQ-19OK">
  <button class="b-purple" onclick="testGetOCRAssignment()">🤖 Get OCR Assignment</button>
  <label>Methods to assign (comma separated):</label>
  <input id="testOCRMethods" placeholder="e.g. gemini,ocrspace,tesseract">
  <button class="b-orange" onclick="testSaveOCRAssignment()">💾 Save OCR Assignment</button>
</div>

<div class="section">
  <div class="section-title">3️⃣ Config Save Test</div>
  <label>Test Gemini Key:</label>
  <input id="testGeminiKey" placeholder="paste gemini key to test save">
  <button class="b-green" onclick="testSaveConfig()">💾 Save Config Keys</button>
</div>

<div class="section">
  <div class="section-title">4️⃣ Device Register Test</div>
  <label>Test Device ID:</label>
  <input id="testRegDeviceId" value="TEST-DIAG-0001">
  <button class="b-blue" onclick="testRegisterDevice()">📲 Register Test Device</button>
  <button class="b-orange" onclick="testCheckStatus()">🔍 Check Status</button>
</div>

<div class="section">
  <div class="section-title">5️⃣ localStorage Check</div>
  <button class="b-purple" onclick="checkLocalStorage()">📦 Check All Keys in Storage</button>
  <button class="b-grey" onclick="clearLog()">🗑 Clear Log</button>
</div>

<div id="log">📋 Ready — tap any button to test...\n</div>

<script>
var PASS = '8700';

function getUrl(){ return document.getElementById('urlInput').value.trim(); }

function log(msg, cls){
  var el = document.getElementById('log');
  var t = new Date().toLocaleTimeString('en-IN');
  el.innerHTML += '<span class="'+(cls||'info')+'">['+t+'] '+escHtml(msg)+'</span>\n';
  el.scrollTop = el.scrollHeight;
}

function escHtml(s){ return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clearLog(){ document.getElementById('log').innerHTML = '📋 Log cleared...\n'; }

function apiFetch(params, onSuccess, onFail){
  var url = getUrl() + params;
  log('→ Fetching: '+params, 'info');
  fetch(url, {redirect:'follow'})
    .then(function(r){
      log('  HTTP: '+r.status, r.ok?'ok':'err');
      return r.text();
    })
    .then(function(text){
      log('  Raw: '+text.slice(0,200), 'info');
      try{
        var data = JSON.parse(text);
        onSuccess(data);
      }catch(e){
        log('  ❌ JSON parse error: '+e.message, 'err');
        if(onFail) onFail(e.message);
      }
    })
    .catch(function(e){
      log('  ❌ Fetch failed: '+e.message, 'err');
      if(onFail) onFail(e.message);
    });
}

// ── 1. TEST CONNECTION ────────────────────────────────────
function testConnection(){
  log('━━━━━━━━ TEST CONNECTION ━━━━━━━━', 'head');
  apiFetch('?action=test&key=AOF_FINDER', function(data){
    if(data.status==='ok') log('✅ CONNECTION OK: '+data.message, 'ok');
    else log('❌ Unexpected: '+JSON.stringify(data), 'err');
  });
}

// ── 2. GET CONFIG ─────────────────────────────────────────
function testGetConfig(){
  log('━━━━━━━━ GET CONFIG KEYS ━━━━━━━━', 'head');
  apiFetch('?action=getConfig&key=AOF_FINDER', function(data){
    if(data.error){ log('❌ Error: '+data.error, 'err'); return; }
    log('geminiKey : '+(data.geminiKey ? '✅ '+data.geminiKey.slice(0,15)+'...' : '❌ EMPTY'), data.geminiKey?'ok':'err');
    log('groqKey   : '+(data.groqKey   ? '✅ '+data.groqKey.slice(0,15)+'...'   : '❌ EMPTY'), data.groqKey?'ok':'err');
    log('ocrKey    : '+(data.ocrKey    ? '✅ '+data.ocrKey.slice(0,15)+'...'    : '❌ EMPTY'), data.ocrKey?'ok':'err');
    log('scriptUrl : '+(data.scriptUrl ? '✅ PRESENT' : '❌ EMPTY'), data.scriptUrl?'ok':'err');
    if(data.debug) log('debug     : '+JSON.stringify(data.debug), 'info');
    // Save to localStorage
    if(data.geminiKey){ 
      localStorage.setItem('geminiApiKey',data.geminiKey);
      localStorage.setItem('aofGeminiKey',data.geminiKey);
    }
    if(data.groqKey){ 
      localStorage.setItem('groqApiKey',data.groqKey);
      localStorage.setItem('aofGroqKey',data.groqKey);
    }
    if(data.ocrKey){ localStorage.setItem('ocrApiKey',data.ocrKey); }
    if(data.scriptUrl){ localStorage.setItem('aofSheetUrl',data.scriptUrl); }
    log('✅ Keys saved to localStorage!', 'ok');
  });
}

// ── 3. LIST DEVICES ───────────────────────────────────────
function testListDevices(){
  log('━━━━━━━━ LIST DEVICES ━━━━━━━━', 'head');
  apiFetch('?action=list&key=AOF_FINDER&password='+PASS, function(data){
    if(data.error){ log('❌ Error: '+data.error, 'err'); return; }
    if(!data.devices){ log('❌ No devices array!', 'err'); return; }
    log('✅ Total devices: '+data.devices.length, 'ok');
    data.devices.forEach(function(d){
      var ocr = d.ocrMethods && d.ocrMethods.length>0 ? d.ocrMethods.join('→') : 'auto';
      log('  📱 '+d.deviceId+' | '+d.deviceName+' | '+d.status+' | OCR: '+ocr,
        d.status==='approved'?'ok':d.status==='pending'?'warn':'err');
    });
  });
}

// ── 4. GET OCR ASSIGNMENT ─────────────────────────────────
function testGetOCRAssignment(){
  log('━━━━━━━━ GET OCR ASSIGNMENT ━━━━━━━━', 'head');
  var devId = document.getElementById('testDeviceId').value.trim();
  if(!devId){ log('❌ Enter Device ID first!', 'err'); return; }
  apiFetch('?action=getOCRAssignment&key=AOF_FINDER&deviceId='+encodeURIComponent(devId), function(data){
    if(data.error){ log('❌ Error: '+data.error, 'err'); return; }
    if(data.methods){
      log('✅ OCR Methods for '+devId+':', 'ok');
      data.methods.forEach(function(m,i){
        log('  Priority '+(i+1)+': '+m, 'ok');
      });
    } else {
      log('❌ No methods returned', 'err');
    }
  });
}

// ── 5. SAVE OCR ASSIGNMENT ────────────────────────────────
function testSaveOCRAssignment(){
  log('━━━━━━━━ SAVE OCR ASSIGNMENT ━━━━━━━━', 'head');
  var devId = document.getElementById('testDeviceId').value.trim();
  var methods = document.getElementById('testOCRMethods').value.trim();
  if(!devId || !methods){ log('❌ Enter Device ID and Methods!', 'err'); return; }
  apiFetch('?action=saveOCRAssignment&key=AOF_FINDER&password='+PASS+
    '&deviceId='+encodeURIComponent(devId)+
    '&methods='+encodeURIComponent(methods), function(data){
    if(data.status==='saved') log('✅ OCR Assignment saved!', 'ok');
    else log('❌ Error: '+JSON.stringify(data), 'err');
  });
}

// ── 6. SAVE CONFIG ────────────────────────────────────────
function testSaveConfig(){
  log('━━━━━━━━ SAVE CONFIG KEYS ━━━━━━━━', 'head');
  var gk = document.getElementById('testGeminiKey').value.trim();
  if(!gk){ log('❌ Enter Gemini key to test!', 'err'); return; }
  apiFetch('?action=saveConfig&key=AOF_FINDER&password='+PASS+
    '&geminiKey='+encodeURIComponent(gk), function(data){
    if(data.status==='saved') log('✅ Config saved!', 'ok');
    else log('❌ Error: '+JSON.stringify(data), 'err');
  });
}

// ── 7. REGISTER DEVICE ────────────────────────────────────
function testRegisterDevice(){
  log('━━━━━━━━ REGISTER TEST DEVICE ━━━━━━━━', 'head');
  var devId = document.getElementById('testRegDeviceId').value.trim() || 'TEST-DIAG-0001';
  var ua = navigator.userAgent;
  var browser = /Edg/i.test(ua)?'Edge':/Chrome/i.test(ua)?'Chrome':/Firefox/i.test(ua)?'Firefox':'Browser';
  var os = /Android/i.test(ua)?'Android':/Windows/i.test(ua)?'Windows':'Unknown';
  apiFetch('?action=register&key=AOF_FINDER'+
    '&deviceId='+encodeURIComponent(devId)+
    '&deviceName=DiagTool'+
    '&browser='+browser+
    '&os='+os+
    '&resolution='+screen.width+'x'+screen.height+
    '&language='+navigator.language+
    '&timezone='+encodeURIComponent(Intl.DateTimeFormat().resolvedOptions().timeZone)+
    '&network=test&battery='+encodeURIComponent('100%')+
    '&openTime='+encodeURIComponent(new Date().toLocaleString('en-IN')),
    function(data){
      log('Status: '+data.status, data.status==='approved'?'ok':data.status==='pending'?'warn':'err');
      if(data.status==='pending') log('ℹ️ Go to sheet and change status to approved', 'warn');
      if(data.status==='approved') log('✅ Device is approved!', 'ok');
    }
  );
}

// ── 8. CHECK STATUS ───────────────────────────────────────
function testCheckStatus(){
  log('━━━━━━━━ CHECK STATUS ━━━━━━━━', 'head');
  var devId = document.getElementById('testRegDeviceId').value.trim() || 'TEST-DIAG-0001';
  apiFetch('?action=check&key=AOF_FINDER&deviceId='+encodeURIComponent(devId), function(data){
    log('Status: '+data.status, data.status==='approved'?'ok':data.status==='pending'?'warn':'err');
  });
}

// ── 9. CHECK LOCALSTORAGE ─────────────────────────────────
function checkLocalStorage(){
  log('━━━━━━━━ LOCALSTORAGE CHECK ━━━━━━━━', 'head');
  var keys = [
    'geminiApiKey','aofGeminiKey',
    'groqApiKey','aofGroqKey',
    'ocrApiKey','aofSheetUrl',
    'aofDeviceId','aofOCRAssignment',
    'aofPinLocked','aofPinAttempts'
  ];
  keys.forEach(function(k){
    var v = localStorage.getItem(k);
    if(v) log('✅ '+k+': '+String(v).slice(0,30)+'...', 'ok');
    else  log('❌ '+k+': EMPTY', 'err');
  });
  log('Total items in storage: '+localStorage.length, 'info');
}
</script>
</body>
</html>
